<div class="flex h-dvh w-dvw flex-col bg-white">
  <app-header-component />
  <app-three-parts-layout class="h-full p-8">
    <ng-container layout-left>
      <app-button-component routerLink="/sign" variant="transparent">
        <ng-icon name="lucideArrowLeft" size="36" />
      </app-button-component>
    </ng-container>

    <ng-container layout-middle>
      <div class="flex h-full w-full flex-col items-center gap-8">
        <h1 class="text-2xl">S'inscrire</h1>

        <div class="flex w-full flex-col gap-4 md:px-12">
          <app-text-input-with-label-component label="Nom d'utilisateur" [(value)]="username" />
          <app-text-input-with-label-component label="Addresse e-mail" [(value)]="email" />
          <app-text-input-with-label-component label="Mot de passe" [(value)]="password" />
        </div>

        <app-button-component variant="primary" (click)="onClick()"
          >S'inscrire</app-button-component
        >
      </div>
    </ng-container>

    <!-- blank -->
  </app-three-parts-layout>
</div>
