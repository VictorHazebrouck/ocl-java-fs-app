<div class="flex h-dvh w-dvw flex-col bg-white">
  <header-component />
  <three-parts-layout class="h-full p-8">
    <ng-container layout-left>
      <button-component routerLink="/sign" variant="transparent">
        <ng-icon name="lucideArrowLeft" size="36" />
      </button-component>
    </ng-container>

    <ng-container layout-middle>
      <div class="flex h-full w-full flex-col items-center gap-8">
        <h1 class="text-2xl">Se connecter</h1>

        <div class="flex w-full flex-col gap-4 md:px-12">
          <text-input-with-label-component class="w-full" label="Nom d'utilisateur ou E-mail" />
          <text-input-with-label-component class="w-full" label="Mot de passe" />
        </div>

        <button-component variant="primary">S'inscrire</button-component>
      </div>
    </ng-container>

    <!-- blank -->
  </three-parts-layout>
</div>
