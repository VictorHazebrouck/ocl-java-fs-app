<div class="flex aspect-video flex-col gap-4 rounded-md bg-gray-100 p-4" [ngClass]="[class()]">
  <h3 class="text-left font-semibold">{{ title() }}</h3>
  <p class="text-left">{{ description() }}</p>
  @if (isSubscribed()) {
    <button-component class="mx-auto mt-auto w-fit" variant="primary">
      Déjà abonné
    </button-component>
  } @else {
    <button-component class="mx-auto mt-auto w-fit" variant="primary"> S'abonner </button-component>
  }
</div>
