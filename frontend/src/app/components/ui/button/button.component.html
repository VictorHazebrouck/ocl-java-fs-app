<button
  class="flex cursor-pointer items-center gap-2 rounded-md px-4 py-2 font-semibold"
  [ngClass]="[
    variant() === 'outline' ? 'border' : '',
    variant() === 'primary' ? 'bg-violet-500 text-white' : '',
    variant() === 'muted' ? 'bg-gray-400 text-white' : '',
    class(),
  ]"
>
  <ng-content />
</button>
