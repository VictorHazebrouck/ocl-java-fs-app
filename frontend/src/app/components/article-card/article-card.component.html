<button
  class="flex aspect-video cursor-pointer flex-col gap-4 rounded-md bg-gray-100 p-4"
  [ngClass]="[class()]"
>
  <h3 class="text-left font-semibold">{{ title() }}</h3>

  <div class="flex">
    <p class="w-1/3 text-left">{{ date() }}</p>
    <p class="text-left">{{ author() }}</p>
  </div>

  <p class="text-left">{{ content() }}</p>
</button>
