<button
  class="flex aspect-video cursor-pointer flex-col gap-4 rounded-md bg-gray-100 p-4"
  [ngClass]="[class()]"
>
  <h3 class="text-left font-semibold">{{ article().title }}</h3>

  <div class="flex">
    <p class="w-1/3 text-left">{{ article().createdAt }}</p>
    <p class="text-left">{{ article().author }}</p>
  </div>

  <p class="text-left">{{ article().content }}</p>
</button>
